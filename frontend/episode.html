<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episode - SideQuest</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        .episode-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .episode-page h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .episode-image {
            width: 100%;
            max-width: 780px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .episode-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .episode-summary {
            line-height: 1.7;
            color: #ccc;
            margin-top: 15px;
            font-size: 1rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">SideQuest</a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="games.html">Games</a>
            <a href="profile.html">Profile & Stats</a>
        </nav>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search..."
                onkeypress="if(event.key === 'Enter') performSearch()">
            <button onclick="performSearch()">Search</button>
        </div>
    </header>

    <div class="container" id="episode-container">
        <h2 style="text-align:center; margin-top: 50px;">Loading Episode...</h2>
    </div>

    <script src="js/api.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", loadEpisode);

        async function loadEpisode() {
            const params = new URLSearchParams(window.location.search);

            const showId = params.get("show_id");
            const season = params.get("season");
            const episode = params.get("episode");

            if (!showId || !season || !episode) {
                document.getElementById("episode-container").innerHTML = `
                    <div style="text-align:center; padding:60px 20px;">
                        <h2 style="color: #ff4444;">No Episode Selected</h2>
                        <p style="color:#aaa;">Please open an episode from a TV show page.</p>
                        <a href="index.html" class="btn" style="margin-top:15px; display:inline-block;">Go Home</a>
                    </div>`;
                return;
            }

            try {
                const data = await api.getEpisodeDetails(showId, season, episode);

                if (!data) {
                    document.getElementById("episode-container").innerHTML =
                        `<div style="text-align:center; padding:60px 20px;">
                            <h2 style="color: #ff4444;">Episode Not Found</h2>
                            <p style="color:#aaa;">Could not find episode data. The server may be down.</p>
                            <a href="index.html" class="btn" style="margin-top:15px; display:inline-block;">Go Home</a>
                        </div>`;
                    return;
                }

                renderEpisode(data, showId);

            } catch (error) {
                console.error("Failed to load episode:", error);
                document.getElementById("episode-container").innerHTML =
                    `<div style="text-align:center; padding:60px 20px;">
                        <h2 style="color: #ff4444;">Failed to Load Episode</h2>
                        <p style="color:#aaa;">Check if the backend server is running.</p>
                        <a href="index.html" class="btn" style="margin-top:15px; display:inline-block;">Go Home</a>
                    </div>`;
            }
        }

        function renderEpisode(data, showId) {
            const title = data.name || "Episode";
            document.title = `${title} - SideQuest`;

            const still = data.still_path
                ? api.getImageUrl(data.still_path, "w780")
                : "";

            const rating = data.vote_average
                ? data.vote_average.toFixed(1)
                : "N/A";

            const html = `
                <div class="episode-page">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                        <h1 style="margin:0">${title}</h1>
                        <a class="btn" href="details.html?type=tv&id=${showId}">← Back to Show</a>
                    </div>

                    ${still ? `<img class="episode-image" src="${still}" alt="${title}" onerror="this.style.display='none'">` : ""}

                    <div class="episode-meta">
                        <span class="badge">Season ${data.season_number}</span>
                        <span class="badge">Episode ${data.episode_number}</span>
                        <span class="badge">Air Date: ${data.air_date || "Unknown"}</span>
                        <span class="badge rating">★ ${rating}</span>
                        ${data.runtime ? `<span class="badge">${data.runtime} min</span>` : ""}
                    </div>

                    <div class="episode-summary">
                        ${data.overview || "No summary available for this episode."}
                    </div>
                </div>
            `;

            document.getElementById("episode-container").innerHTML = html;

            // FEATURE 4: Mark Episode as Watched
            markAsWatched(showId, data);
        }

        async function markAsWatched(showId, epData) {
            try {
                // Mocking a User ID to 1 for this demo
                const watchData = {
                    user_id: 1,
                    show_id: parseInt(showId),
                    show_name: "", // Not strictly needed by the backend schema, but can be added if we fetched show details
                    season_number: epData.season_number,
                    episode_number: epData.episode_number,
                    episode_name: epData.name || "Unknown Episode"
                };

                const res = await api.watchEpisode(watchData);
                console.log("Watched status:", res);
            } catch (err) {
                console.error("Failed to mark as watched:", err);
            }
        }

        function performSearch() {
            const query = document.getElementById("searchInput").value;
            if (query.trim() === "") return;
            window.location.href = `search.html?q=${encodeURIComponent(query.trim())}`;
        }
    </script>

</body>

</html>
