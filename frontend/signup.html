<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideQuest - Sign Up</title>
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <header class="auth-header">
            <h1 onclick="window.location.href='index.html'" style="cursor: pointer;">SideQuest</h1>
            <p style="color: #bbb; font-size: 0.9rem;">Join the quest for your next obsession</p>
        </header>

        <div id="error-message" class="error-message"></div>

        <form class="auth-form" id="signupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
            </div>
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <footer class="auth-footer">
            Already have an account? <a href="login.html">Login here</a>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');

            errorEl.style.display = 'none';

            try {
                const res = await api.signup({ username, email, password });
                if (res && res.token) {
                    // Save user to local storage
                    auth.saveUser({
                        id: res.user_id,
                        username: res.username,
                        token: res.token
                    });
                    window.location.href = 'index.html';
                } else {
                    errorEl.textContent = "Signup failed. Review your details and try again.";
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = "An error occurred. Is the server running?";
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
